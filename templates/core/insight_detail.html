{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1>{{ article.title }}</h1>
    <p class="text-muted">{{ article.category.name }} | {{ article.read_time }} min read</p>
    <div class="article-content">
        {{ article.content|safe }}
    </div>
</div>
{% endblock %}
